<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDD Exchange</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.2/dist/web3.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
        body{background:#0f172a;color:#fff;padding:20px;min-height:100vh}
        .box{max-width:500px;margin:0 auto;background:#1e293b;padding:24px;border-radius:16px}
        h2{text-align:center;margin-bottom:24px;color:#38bdf8}
        .item{margin-bottom:16px}
        label{display:block;margin-bottom:8px;color:#cbd5e1}
        input{width:100%;padding:14px;border:1px solid #475569;background:#0f172a;color:#fff;border-radius:10px;font-size:16px}
        .btn{width:100%;padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer;background:#0284c7;color:#fff}
        .info{margin-top:20px;padding:16px;background:#334155;border-radius:10px;font-size:14px;line-height:1.6}
    </style>
</head>
<body>
<div class="box">
    <h2>FSY 兑换通道</h2>
    <div class="item">
        <label>支付USDT数量（1U=10FSY）</label>
        <input id="usdtInput" placeholder="输入USDT金额" value="">
    </div>
    <button class="btn" id="swapBtn">一键兑换FSY</button>

    <div class="info">
        <p>当前钱包地址：<span id="walletAddr">-</span></p>
        <p>合约剩余可兑换FSY：<span id="remainFSY">-</span></p>
        <p>合约剩余LP储备FSY：<span id="remainLP">-</span></p>
        <p>合约状态：<span id="contractStatus">-</span></p>
    </div>
</div>

<script>
const USDT_CONTRACT = "0x55d398326f99059fF775485246999027B3197955";
const EXCHANGE_CONTRACT = "0xa5683943280e0ec64301debb778deac086b40cd6";

const USDT_ABI = [
    {"constant":false,"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"},
    {"constant":true,"inputs":[{"name":"_owner","type":"address"},{"name":"_spender","type":"address"}],"name":"allowance","outputs":[{"name":"","type":"uint256"}],"type":"function"}
];

const EXCHANGE_ABI = [
    {"inputs":[{"internalType":"uint256","name":"payUSDTAmount","type":"uint256"}],"name":"exchangeFSY","outputs":[],"stateMutability":"nonpayable","type":"function"},
    {"inputs":[],"name":"getRemainUserFSY","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"getRemainLpReserveFSY","outputs":[{"internalType":"uint256","name":"","type":"uint256"}],"stateMutability":"view","type":"function"},
    {"inputs":[],"name":"exchangeClosed","outputs":[{"internalType":"bool","name":"","type":"bool"}],"stateMutability":"view","type":"function"}
];

let web3 = null;
let userWallet = "";
let usdtContract = null;
let exchangeContract = null;
const decimals = 18;
let LOW_GAS;

window.onload = async function(){
    await initWeb3();
    setInterval(updateContractInfo,5000);
}

async function initWeb3(){
    if(!window.ethereum){
        document.getElementById("walletAddr").innerText="非TP钱包浏览器";
        return;
    }
    try{
        web3 = new Web3(window.ethereum);
        LOW_GAS = web3.utils.toWei("1","gwei");
        let acc = await window.ethereum.request({method:'eth_requestAccounts'});
        userWallet = acc[0];
        document.getElementById("walletAddr").innerText = userWallet.slice(0,10)+"..."+userWallet.slice(-8);
        usdtContract = new web3.eth.Contract(USDT_ABI,USDT_CONTRACT);
        exchangeContract = new web3.eth.Contract(EXCHANGE_ABI,EXCHANGE_CONTRACT);
        updateContractInfo();
    }catch(e){
        document.getElementById("walletAddr").innerText="链接失败";
    }
}

async function updateContractInfo(){
    if(!exchangeContract) return;
    try{
        let remUser = await exchangeContract.methods.getRemainUserFSY().call();
        let remLp = await exchangeContract.methods.getRemainLpReserveFSY().call();
        let closeStat = await exchangeContract.methods.exchangeClosed().call();
        document.getElementById("remainFSY").innerText = web3.utils.fromWei(remUser,decimals);
        document.getElementById("remainLP").innerText = web3.utils.fromWei(remLp,decimals);
        document.getElementById("contractStatus").innerText = closeStat?"通道关闭":"正常开放";
    }catch(e){}
}

document.getElementById("swapBtn").onclick = async function(){
    if(!userWallet){
        alert("正在连接钱包，稍候重试");
        return;
    }
    let inputVal = document.getElementById("usdtInput").value.trim();
    if(isNaN(inputVal)||Number(inputVal)<=0){
        alert("请填写正确USDT数量");
        return;
    }
    let needWei = web3.utils.toWei(inputVal,"ether");
    try{
        let allow = await usdtContract.methods.allowance(userWallet,EXCHANGE_CONTRACT).call();
        let bnAllow = web3.utils.toBN(allow);
        let bnNeed = web3.utils.toBN(needWei);

        if(bnAllow.lt(bnNeed)){
            await usdtContract.methods.approve(EXCHANGE_CONTRACT,needWei).send({
                from:userWallet,
                gasPrice:LOW_GAS
            });
        }
        await exchangeContract.methods.exchangeFSY(needWei).send({
            from:userWallet,
            gasPrice:LOW_GAS
        });
        alert("兑换成功");
        document.getElementById("usdtInput").value="";
        updateContractInfo();
    }catch(err){
        alert("失败："+(err.message||err));
    }
}
</script>
</body>
</html>
